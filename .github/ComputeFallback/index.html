<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch-Mode-Visualizer | Initializing Workbench</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 1; }
        }
        .pulse-engine { animation: pulse-ring 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen flex flex-col items-center justify-center p-4 selection:bg-amber-500 selection:text-neutral-950">

    <div class="max-w-md w-full bg-neutral-900/40 border border-neutral-800/80 rounded-2xl p-8 text-center shadow-2xl backdrop-blur-md relative overflow-hidden">
        
        <div class="relative w-24 h-24 mx-auto mb-6 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border-4 border-dashed border-neutral-800 animate-spin" style="animation-duration: 20s;"></div>
            <div class="absolute inset-2 rounded-full border border-amber-500/20 pulse-engine"></div>
            <svg class="w-10 h-10 text-amber-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6l4 2M12 21a9 9 0 100-18 9 9 0 000 18z"></path>
            </svg>
        </div>

        <h1 class="text-xl font-bold tracking-tight text-neutral-100">Initializing AI Assembly Bench</h1>
        <p class="text-xs text-neutral-500 mt-2 max-w-sm mx-auto">
            The Watch-Mode-Visualizer compute engine is spinning up from a cold sleep status layer.
        </p>

        <div class="mt-6 space-y-2">
            <div class="w-full bg-neutral-950 border border-neutral-800 h-2 rounded-full overflow-hidden relative">
                <div id="progress-indicator" class="bg-amber-500 h-full w-4 transition-all duration-500 ease-out rounded-full shadow-lg shadow-amber-500/20"></div>
            </div>
            <div class="flex justify-between items-center text-[10px] font-mono tracking-wider uppercase text-neutral-500 px-0.5">
                <span id="status-string">Delivering Boot Payload...</span>
                <span id="percentage-string">2%</span>
            </div>
        </div>

        <div class="mt-6 pt-4 border-t border-neutral-800/60 text-[10px] text-neutral-600 uppercase font-mono tracking-widest">
            AWS ca-central-1 • Serverless Boot Loop
        </div>
    </div>

    <script>
        // 🎯 Injected Target Endpoint Architecture Variables
        const WAKE_API_URL = "https://xbeo6okcx3.execute-api.ca-central-1.amazonaws.com/wake";
        
        // This will point to your primary CloudFront API endpoint once built
        const HEALTH_CHECK_URL = window.location.origin + "/api/health"; 
        
        const progressIndicator = document.getElementById("progress-indicator");
        const statusString = document.getElementById("status-string");
        const percentageString = document.getElementById("percentage-string");

        let simulatedProgress = 2;
        let pollingInterval = null;

        // Smoothly steps up progress meter to simulate initialization timeline
        const cycleProgressMetrics = (targetMax, labelString) => {
            statusString.innerText = labelString;
            if (simulatedProgress < targetMax) {
                simulatedProgress += Math.floor(Math.random() * 8) + 2;
                if (simulatedProgress > targetMax) simulatedProgress = targetMax;
                progressIndicator.style.width = simulatedProgress + "%";
                percentageString.innerText = simulatedProgress + "%";
            }
        };

        const initiateAwakeningSequence = async () => {
            try {
                // 1. Send the instant wake-up pulse to the Lambda API Gateway channel
                const response = await fetch(WAKE_API_URL);
                const metadata = await response.json();
                
                if (metadata.status === "waking_up" || metadata.status === "online") {
                    // 2. Start polling the actual backend system loop
                    startSystemHealthPolling();
                } else {
                    statusString.innerText = "Retrying Connection Loop...";
                    setTimeout(initiateAwakeningSequence, 3000);
                }
            } catch (error) {
                console.error("Awakening signal failure:", error);
                statusString.innerText = "Network Gateway Interrupted.";
                setTimeout(initiateAwakeningSequence, 4000);
            }
        };

        const startSystemHealthPolling = () => {
            pollingInterval = setInterval(async () => {
                // Step progress indicators gracefully across boot thresholds
                if (simulatedProgress < 45) {
                    cycleProgressMetrics(45, "Waking Virtual Hardware...");
                } else if (simulatedProgress < 85) {
                    cycleProgressMetrics(85, "Baking MobileSAM Model weights...");
                } else {
                    cycleProgressMetrics(98, "Opening Secure Network Lanes...");
                }

                try {
                    // Drop a direct check to see if our FastAPI server is online on the internet yet
                    const check = await fetch(HEALTH_CHECK_URL);
                    
                    if (check.status === 200) {
                        // Backend is fully initialized with model ready! Snap progress to 100% and hard reload domain
                        clearInterval(pollingInterval);
                        progressIndicator.style.width = "100%";
                        percentageString.innerText = "100%";
                        statusString.innerText = "Workbench Ready! Connecting...";
                        
                        setTimeout(() => {
                            window.location.reload(true);
                        }, 1000);
                    }
                } catch (nodeOfflineException) {
                    // Gracefully catch fetch errors while port 8000 is still closed during boot
                    console.log("Waiting for FastAPI Uvicorn engine to hook sockets...");
                }
            }, 2500);
        };

        // Initialize execution on content render handshake
        document.addEventListener("DOMContentLoaded", initiateAwakeningSequence);
    </script>
</body>
</html>
