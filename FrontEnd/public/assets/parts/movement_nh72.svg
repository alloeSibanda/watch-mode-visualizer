<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Invisible container symmetry spacer box -->
  <rect x="0" y="0" width="200" height="200" fill="none" opacity="0"/>
  
  <g id="nh72-rhodium-core">
    <!-- Outer Main Movement Framework Ring (Dark Gunmetal Finish) -->
    <circle cx="100" cy="100" r="54" fill="#171717" stroke="#404040" stroke-width="4.5"/>
    <circle cx="100" cy="100" r="48" fill="none" stroke="#525252" stroke-width="1" stroke-dasharray="3 3"/>
    
    <!-- Open Heart Window Cutout -->
    <circle cx="74" cy="100" r="16" fill="#0a0a0a" stroke="#404040" stroke-width="1.5"/>
    
    <!-- Exposed Gunmetal Balance Wheel with Gold Balance Rim -->
    <circle cx="74" cy="100" r="11" fill="none" stroke="#d97706" stroke-width="2"/>
    <line x1="74" y1="89" x2="74" y2="111" stroke="#525252" stroke-width="2"/>
    
    <!-- Darkened Mechanical Train Bridges -->
    <path d="M 94,60 C 114,58 134,74 134,94 L 114,94 Z" fill="#262626" stroke="#404040" stroke-width="1.2"/>
    <path d="M 100,106 C 120,108 130,128 120,142 L 104,124 Z" fill="#262626" stroke="#404040" stroke-width="1.2"/>
    
    <!-- Exposed Internal Gear Inlays -->
    <circle cx="114" cy="78" r="9" fill="none" stroke="#a3a3a3" stroke-width="1.5"/>
    <circle cx="122" cy="104" r="12" fill="none" stroke="#a3a3a3" stroke-width="1.5"/>
    
    <!-- Intense Deep Pink Ruby Jewels -->
    <circle cx="102" cy="76" r="2.5" fill="#db2777" opacity="0.95"/>
    <circle cx="114" cy="78" r="1.5" fill="#be185d" opacity="0.95"/>
    <circle cx="122" cy="104" r="1.5" fill="#be185d" opacity="0.95"/>
    
    <!-- Center Pinion Cap Connection Hub -->
    <circle cx="100" cy="100" r="9" fill="#404040" stroke="#262626" stroke-width="1"/>
    <circle cx="100" cy="100" r="4" fill="#171717"/>
  </g>
</svg>
